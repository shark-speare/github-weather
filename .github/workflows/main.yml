# .github/workflows/scheduled.yml
name: Scheduled Python Job

on:
  schedule:
    - cron: '0 * */1 * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (for script)
        uses: actions/checkout@v4
        with:
          ref: main  # 先 checkout main 拿到 main.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Checkout data branch
        run: |
          git fetch origin data
          git checkout data  # 切換到 data 分支

      - name: Copy main.py from main
        run: |
          git checkout main -- main.py  # 只把 main.py 帶過來

      - name: Run main.py
        run: uv run main.py  # 現在是在 data 分支的檔案環境下執行

      - name: Commit and push to data branch
        run: |
          git add .
          git diff --staged --quiet || git commit -m "chore: update data [skip ci]"
          git push origin data